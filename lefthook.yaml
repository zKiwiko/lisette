commit-msg:
  commands:
    conventional-commit:
      run: |
        MSG=$(head -1 {1})
        echo "$MSG" | grep -qE "^(feat|fix|refactor|test|docs|chore|ci|perf|build)(\(.+\))?!?: [a-z].*" || { echo "Commit message must follow Conventional Commits: <type>: <description> (lowercase after colon)"; exit 1; }
        LEN=$(echo -n "$MSG" | wc -c | tr -d ' ')
        [ "$LEN" -le 72 ] || { echo "Commit subject is $LEN chars (max 72)"; exit 1; }

pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{rs,lis,toml}"
      run: just check && just check-stdlib-typedefs
    bindgen:
      glob: "tools/bindgen/**/*.go"
      root: "tools/bindgen"
      run: just check
    regenerate-stdlib-typedefs:
      glob: "tools/bindgen/**/*.go"
      run: just regenerate-stdlib-typedefs && git diff --exit-code crates/stdlib/
    go-version-sync:
      glob: "{go-version,prelude/go.mod,tools/bindgen/go.mod}"
      run: |
        EXPECTED=$(cat go-version | cut -d. -f1,2)
        PRELUDE=$(grep '^go ' prelude/go.mod | awk '{print $2}')
        BINDGEN=$(grep '^go ' tools/bindgen/go.mod | awk '{print $2}' | cut -d. -f1,2)
        [ "$EXPECTED" = "$PRELUDE" ] || { echo "Go version mismatch: go-version has $EXPECTED but prelude/go.mod has $PRELUDE"; exit 1; }
        [ "$EXPECTED" = "$BINDGEN" ] || { echo "Go version mismatch: go-version has $EXPECTED but tools/bindgen/go.mod has $BINDGEN"; exit 1; }
