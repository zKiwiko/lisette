name: Release gates

on:
  push:
    branches: ['release-plz-*']

concurrency:
  group: release-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-build-gate:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - run: cargo build -p lisette

  packaging-gate:
    name: Packaging dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - run: cargo publish --workspace --dry-run

  changelog-tripwire:
    name: Changelog completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify all commits since last tag are in CHANGELOG.md
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 --match 'lisette-v*' origin/main 2>/dev/null \
                 || git rev-list --max-parents=0 origin/main | head -1)
          MISSING=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SHA="${line%% *}"
            SUBJ="${line#* }"
            case "$SUBJ" in
              "chore: bump stdlib typedefs"*) continue ;;
              "chore: release"*) continue ;;
            esac
            if ! grep -q "${SHA:0:7}" CHANGELOG.md; then
              MISSING+=("$SHA $SUBJ")
            fi
          done < <(git log --no-merges --format='%H %s' "${PREV}..origin/main")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Commits missing from CHANGELOG.md:"
            for entry in "${MISSING[@]}"; do
              echo "  $entry"
            done
            echo "::error::${#MISSING[@]} commit(s) missing from CHANGELOG.md (see job log)"
            exit 1
          fi
          echo "All commits since ${PREV} are present in CHANGELOG.md."
