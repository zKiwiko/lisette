name: Prepare release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare release PR
    if: "${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-prepare-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        run: rustup show

      - uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # ratchet:release-plz/action@v0.5
        id: release-plz
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # ratchet:taiki-e/install-action@v2
        if: ${{ steps.release-plz.outputs.pr != '' && steps.release-plz.outputs.pr != '{}' }}
        with:
          tool: git-cliff@2.13.1

      - name: Regenerate changelog with full-repo scope
        if: ${{ steps.release-plz.outputs.pr != '' && steps.release-plz.outputs.pr != '{}' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          BRANCH=$(echo "$PR_JSON" | jq -er '.head_branch')
          PR_NUM=$(echo "$PR_JSON" | jq -er '.number')
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          NEW_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TAG="lisette-v${NEW_VERSION}"
          git-cliff --config cliff.toml --tag "$TAG" -o CHANGELOG.md
          git-cliff --config cliff.toml --tag "$TAG" --unreleased --strip all > /tmp/pr-body.md
          sed -i "1c## ${NEW_VERSION} (upcoming)" /tmp/pr-body.md

          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md unchanged after regeneration"
          else
            git -c "user.name=github-actions[bot]" \
                -c "user.email=41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "chore: regenerate changelog with full-repo scope" CHANGELOG.md
            git push origin "HEAD:${BRANCH}"
          fi

          gh pr edit "$PR_NUM" --body-file /tmp/pr-body.md
