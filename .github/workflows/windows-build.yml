name: Windows build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-build:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build lisette
        run: cargo build -p lisette
