name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pr-title:
    name: PR title
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          CONVENTIONAL_COMMIT_REGEX: '^(feat|fix|refactor|test|docs|chore|ci|perf|build)(\(.+\))?!?: [a-z].*'
        run: |
          if ! echo "$PR_TITLE" | grep -qE "$CONVENTIONAL_COMMIT_REGEX"; then
            echo "PR title: $PR_TITLE"
            echo ""
            echo "PR title must follow Conventional Commits: <type>: <description>"
            echo "Types: feat, fix, refactor, test, docs, chore, ci, perf, build"
            exit 1
          fi
          LEN=$(echo -n "$PR_TITLE" | wc -c | tr -d ' ')
          if [ "$LEN" -gt 72 ]; then
            echo "PR title is $LEN chars (max 72)"
            exit 1
          fi

  format:
    name: Format
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          cache: 'false'
      - run: just format-check

  clippy:
    name: Clippy
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
      - run: just lint

  golangci-lint:
    name: Golangci-lint
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go-version
          cache: true
          cache-dependency-path: '**/go.sum'
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1
      - run: cd bindgen && golangci-lint run
      - run: cd prelude && golangci-lint run

  test:
    name: Test
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          go: 'true'
      - run: cargo test -p tests --test suite -- --format terse

  stdlib-check:
    name: Stdlib check
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just check-stdlib-drift

  e2e-smoke:
    name: E2E smoke
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just test-e2e-smoke

  e2e-suite:
    name: E2E suite
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          just: 'true'
          go: 'true'
      - run: just test-e2e-suite

  prelude-go:
    name: Prelude tests
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go-version
          cache: true
          cache-dependency-path: '**/go.sum'
      - run: cd prelude && go test ./...

  shear:
    name: Shear
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache: 'false'
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # ratchet:taiki-e/install-action@v2
        with:
          tool: cargo-shear@1.6.0
      - run: cargo shear

  deny:
    name: Deny
    if: ${{ !startsWith(github.head_ref, 'release-plz-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          cache: 'false'
      - uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # ratchet:taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0
      - run: cargo deny check
