[workspace]
changelog_update = false
git_tag_enable = false
git_release_enable = false
semver_check = false

[[package]]
name = "lisette"
git_tag_enable = true
git_release_enable = true
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
  "lisette-syntax",
  "lisette-semantics",
  "lisette-diagnostics",
  "lisette-emit",
  "lisette-format",
  "lisette-stdlib",
  "lisette-deps",
  "lisette-lsp",
]

[changelog]
header = """# Changelog

Lisette is under active development. Any version before 1.0.0 may include breaking changes.
"""
body = '''
## [{{ version }}](https://github.com/ivov/lisette/compare/lisette-v{{ previous.version }}...lisette-v{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% for commit in commits %}
{%- set subject = commit.raw_message | split(pat="\n") | first | trim -%}
{%- set sha = commit.id | truncate(length=7, end="") -%}
{%- if subject is matching("\(\[#\d+\]\([^)]*\)\)$") -%}
{%- set head = subject | split(pat=" ([#") | slice(end=-1) | join(sep=" ([#") -%}
{%- set pr = subject | split(pat="[#") | last | split(pat="]") | first %}
- {{ head }} [#{{ pr }}](https://github.com/ivov/lisette/pull/{{ pr }}) [`{{ sha }}`](https://github.com/ivov/lisette/commit/{{ commit.id }})
{%- else %}
- {{ subject }} [`{{ sha }}`](https://github.com/ivov/lisette/commit/{{ commit.id }})
{%- endif %}
{%- endfor %}

'''
commit_preprocessors = [
  { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/ivov/lisette/pull/${1}))" },
]
commit_parsers = [
  { message = "^chore: bump stdlib typedefs", skip = true },
  { message = ".*", group = "all" },
]
